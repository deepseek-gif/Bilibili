<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B站视频数据监控大屏 - 在线版</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'cyber': {
              'bg': '#0a0e27',
              'card': 'rgba(13, 17, 42, 0.85)',
              'cyan': '#00e5ff',
              'pink': '#ff2d95',
              'gold': '#ffd740',
              'green': '#00e676',
              'border': 'rgba(0,229,255,0.15)',
            }
          },
          fontFamily: {
            'mono': ['"JetBrains Mono"', '"Fira Code"', 'Consolas', 'monospace'],
          },
          animation: {
            'pulse-glow': 'pulseGlow 2s ease-in-out infinite',
            'scan-line': 'scanLine 4s linear infinite',
            'float': 'float 6s ease-in-out infinite',
            'count-up': 'countUp 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94)',
          },
          keyframes: {
            pulseGlow: {
              '0%, 100%': { boxShadow: '0 0 8px rgba(0,229,255,0.3), 0 0 20px rgba(0,229,255,0.1)' },
              '50%': { boxShadow: '0 0 16px rgba(0,229,255,0.5), 0 0 40px rgba(0,229,255,0.2)' },
            },
            scanLine: {
              '0%': { transform: 'translateY(-100%)' },
              '100%': { transform: 'translateY(100vh)' },
            },
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-10px)' },
            },
          },
        }
      }
    }
  </script>
  <style>
    /* ========== 全局基础样式 ========== */
    * { box-sizing: border-box; }

    body {
      background: linear-gradient(135deg, #0a0e27 0%, #0d112a 30%, #0f1535 60%, #0a0e27 100%);
      min-height: 100vh;
      font-family: 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
      overflow-x: hidden;
      position: relative;
    }

    /* ========== 动态网格背景 ========== */
    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    /* ========== 扫描线效果 ========== */
    .scan-line {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background: linear-gradient(to bottom,
        transparent 0%,
        rgba(0,229,255,0.015) 50%,
        transparent 100%
      );
      animation: scanLine 4s linear infinite;
    }
    @keyframes scanLine {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(100vh); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ========== 粒子效果 ========== */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: rgba(0,229,255,0.4);
      border-radius: 50%;
      animation: particleFloat linear infinite;
    }
    @keyframes particleFloat {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    /* ========== 标题发光效果 ========== */
    .title-glow {
      text-shadow:
        0 0 10px rgba(0,229,255,0.5),
        0 0 20px rgba(0,229,255,0.3),
        0 0 40px rgba(0,229,255,0.15),
        0 0 80px rgba(0,229,255,0.08);
    }

    /* ========== 玻璃卡片 ========== */
    .glass-card {
      background: rgba(13, 17, 42, 0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(0,229,255,0.12);
      border-radius: 16px;
      transition: all 0.3s ease;
    }
    .glass-card:hover {
      border-color: rgba(0,229,255,0.3);
      box-shadow: 0 0 20px rgba(0,229,255,0.08), 0 8px 32px rgba(0,0,0,0.4);
    }

    /* ========== 数据卡片 ========== */
    .stat-card {
      background: rgba(13, 17, 42, 0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(0,229,255,0.12);
      border-radius: 16px;
      transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      position: relative;
      overflow: hidden;
    }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent, #00e5ff), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .stat-card.updated::before { opacity: 1; }
    .stat-card:hover { transform: translateY(-4px); }
    .stat-card.updated {
      animation: cardPulse 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    @keyframes cardPulse {
      0%, 100% { box-shadow: 0 0 0px transparent; }
      50% { box-shadow: 0 0 30px rgba(0,229,255,0.2), 0 0 60px rgba(0,229,255,0.08); }
    }

    /* ========== 数字滚动容器 ========== */
    .number-display {
      font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
      font-weight: 700;
      transition: color 0.3s;
    }
    .number-display.counting {
      color: var(--accent, #00e5ff);
    }

    /* ========== 脉冲指示灯 ========== */
    .pulse-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #00e676;
      position: relative;
    }
    .pulse-dot::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 2px solid rgba(0,230,118,0.4);
      animation: ripple 1.5s ease-out infinite;
    }
    @keyframes ripple {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(2.5); opacity: 0; }
    }

    /* ========== 输入框样式 ========== */
    .cyber-input {
      background: rgba(10, 14, 39, 0.8);
      border: 1px solid rgba(0,229,255,0.2);
      color: #e0e0e0;
      font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
      letter-spacing: 2px;
      transition: all 0.3s ease;
    }
    .cyber-input:focus {
      outline: none;
      border-color: rgba(0,229,255,0.6);
      box-shadow: 0 0 20px rgba(0,229,255,0.15), inset 0 0 10px rgba(0,229,255,0.05);
    }
    .cyber-input::placeholder {
      color: rgba(255,255,255,0.2);
      letter-spacing: 1px;
    }

    /* ========== 按钮样式 ========== */
    .cyber-btn {
      background: linear-gradient(135deg, rgba(0,229,255,0.2), rgba(0,229,255,0.05));
      border: 1px solid rgba(0,229,255,0.3);
      color: #00e5ff;
      font-weight: 600;
      letter-spacing: 2px;
      transition: all 0.3s ease;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    .cyber-btn:hover {
      background: linear-gradient(135deg, rgba(0,229,255,0.3), rgba(0,229,255,0.1));
      border-color: rgba(0,229,255,0.6);
    }
    .cyber-btn:active {
      transform: scale(0.97);
    }
    .cyber-btn::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(0,229,255,0.1) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .cyber-btn:hover::before { opacity: 1; }

    .cyber-btn.active {
      background: linear-gradient(135deg, rgba(255,45,149,0.2), rgba(255,45,149,0.05));
      border-color: rgba(255,45,149,0.4);
      color: #ff2d95;
    }
    .cyber-btn.active:hover {
      background: linear-gradient(135deg, rgba(255,45,149,0.3), rgba(255,45,149,0.1));
      border-color: rgba(255,45,149,0.6);
    }

    /* ========== 视频封面样式 ========== */
    .cover-img {
      border-radius: 12px;
      border: 1px solid rgba(0,229,255,0.15);
      transition: all 0.3s ease;
      object-fit: cover;
    }

    /* ========== 响应式 ========== */
    @media (max-width: 768px) {
      .stat-cards-grid {
        grid-template-columns: 1fr !important;
      }
    }

    /* ========== 自定义滚动条 ========== */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
    ::-webkit-scrollbar-thumb {
      background: rgba(0,229,255,0.2);
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover { background: rgba(0,229,255,0.4); }
  </style>
</head>
<body class="m-0 p-0">

  <!-- 动态背景 -->
  <div class="grid-bg"></div>
  <div class="scan-line"></div>
  <div class="particles" id="particles"></div>

  <!-- 主内容区 -->
  <div class="relative z-10 min-h-screen flex flex-col items-center px-4 py-3">

    <!-- 标题 -->
    <div class="text-center mb-4 mt-2 animate-float">
      <h1 class="text-2xl md:text-3xl font-bold tracking-widest title-glow mb-1" style="color: #00e5ff;">
        📊 视频数据监控大屏
      </h1>
      <p class="text-xs tracking-widest" style="color: rgba(0,229,255,0.4); letter-spacing: 6px;">
        BILIBILI REAL-TIME MONITOR
      </p>
    </div>

    <!-- 输入区域 -->
    <div class="glass-card w-full max-w-2xl p-4 md:p-5 mb-4">
      <div class="flex flex-col sm:flex-row gap-4 items-center">
        <div class="relative flex-1 w-full">
          <span class="absolute left-4 top-1/2 -translate-y-1/2 text-sm font-mono" style="color: rgba(0,229,255,0.4);">BV</span>
          <input
            id="bvidInput"
            type="text"
            placeholder="输入视频 BV 号"
            maxlength="20"
            class="cyber-input w-full pl-12 pr-4 py-3 rounded-xl text-base font-mono"
            style="letter-spacing: 3px;"
            autocomplete="off"
          >
        </div>
        <button
          id="monitorBtn"
          onclick="toggleMonitor()"
          class="cyber-btn whitespace-nowrap px-6 py-3 rounded-xl text-sm w-full sm:w-auto"
        >
          ▶ 开始监控
        </button>
      </div>
    </div>

    <!-- 视频信息区（初始隐藏） -->
    <div id="videoInfo" class="w-full max-w-4xl hidden mb-3">
      <div class="glass-card p-4 md:p-5 flex flex-col sm:flex-row gap-4 items-center sm:items-start">
        <!-- 封面 -->
        <div class="flex-shrink-0">
          <img id="coverImg" src="" alt="视频封面" class="cover-img w-32 h-20 md:w-48 md:h-28 shadow-lg bg-gray-800" referrerpolicy="no-referrer">
        </div>
        <!-- 信息 -->
        <div class="flex-1 text-left w-full">
          <h2 id="videoTitle" class="text-base md:text-lg font-bold mb-1 leading-snug" style="color: #e8e8e8;"></h2>
          <div class="flex flex-wrap gap-3 text-xs" style="color: rgba(255,255,255,0.5);">
            <span id="videoAuthor" class="flex items-center gap-1"></span>
            <span id="videoDuration" class="flex items-center gap-1"></span>
            <span id="videoPubdate" class="flex items-center gap-1"></span>
          </div>
          <div id="videoDesc" class="mt-2 text-xs leading-relaxed line-clamp-2" style="color: rgba(255,255,255,0.3);"></div>
        </div>
      </div>
    </div>

    <!-- 数据卡片区 -->
    <div id="statsArea" class="w-full max-w-5xl hidden">
      <div class="stat-cards-grid grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-5">

        <!-- 播放量卡片 -->
        <div id="card-view" class="stat-card p-6 md:p-8 text-center" style="--accent: #00e5ff;">
          <div class="flex items-center justify-center gap-2 mb-4">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="#00e5ff" stroke-width="1.5" fill="none"/>
              <circle cx="12" cy="12" r="3" stroke="#00e5ff" stroke-width="1.5" fill="none"/>
            </svg>
            <span class="text-sm tracking-widest" style="color: rgba(0,229,255,0.6);">播放量</span>
          </div>
          <div id="num-view" class="number-display text-2xl sm:text-3xl md:text-4xl lg:text-5xl break-all px-1" style="color: #00e5ff;">0</div>
          <div id="delta-view" class="mt-3 text-sm h-6" style="color: rgba(0,229,255,0.5);"></div>
        </div>

        <!-- 点赞数卡片 -->
        <div id="card-like" class="stat-card p-6 md:p-8 text-center" style="--accent: #ff2d95;">
          <div class="flex items-center justify-center gap-2 mb-4">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
              <path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z" stroke="#ff2d95" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span class="text-sm tracking-widest" style="color: rgba(255,45,149,0.6);">点赞数</span>
          </div>
          <div id="num-like" class="number-display text-2xl sm:text-3xl md:text-4xl lg:text-5xl break-all px-1" style="color: #ff2d95;">0</div>
          <div id="delta-like" class="mt-3 text-sm h-6" style="color: rgba(255,45,149,0.5);"></div>
        </div>

        <!-- 弹幕数卡片 -->
        <div id="card-danmaku" class="stat-card p-6 md:p-8 text-center" style="--accent: #ffd740;">
          <div class="flex items-center justify-center gap-2 mb-4">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
              <rect x="3" y="3" width="18" height="14" rx="2" stroke="#ffd740" stroke-width="1.5" fill="none"/>
              <path d="M7 8h10M7 12h6" stroke="#ffd740" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <span class="text-sm tracking-widest" style="color: rgba(255,215,64,0.6);">弹幕数</span>
          </div>
          <div id="num-danmaku" class="number-display text-2xl sm:text-3xl md:text-4xl lg:text-5xl break-all px-1" style="color: #ffd740;">0</div>
          <div id="delta-danmaku" class="mt-3 text-sm h-6" style="color: rgba(255,215,64,0.5);"></div>
        </div>

      </div>
    </div>

    <!-- 状态栏 -->
    <div id="statusBar" class="w-full max-w-5xl mt-4 hidden">
      <div class="glass-card px-6 py-3 flex flex-wrap items-center justify-between gap-3 text-sm">
        <div class="flex items-center gap-3">
          <span class="pulse-dot"></span>
          <span style="color: #00e676;">监控中</span>
          <span class="px-2 py-0.5 rounded text-xs font-mono" style="background: rgba(0,229,255,0.1); color: #00e5ff;">30秒/次</span>
        </div>
        <div class="flex flex-wrap gap-4 text-xs" style="color: rgba(255,255,255,0.4);">
          <span>刷新次数: <strong id="refreshCount" class="font-mono" style="color: rgba(0,229,255,0.6);">0</strong></span>
          <span>最后更新: <strong id="lastUpdate" class="font-mono" style="color: rgba(0,229,255,0.6);">--</strong></span>
        </div>
      </div>
    </div>

    <!-- 错误提示/加载状态 -->
    <div id="messageBar" class="w-full max-w-2xl mt-4 hidden">
      <div id="messageContent" class="glass-card px-5 py-3 text-sm text-center"></div>
    </div>

  </div>

  <script>
  // ==================== 核心逻辑 ====================

  // DOM元素
  const bvidInput = document.getElementById('bvidInput');
  const monitorBtn = document.getElementById('monitorBtn');
  const videoInfo = document.getElementById('videoInfo');
  const statsArea = document.getElementById('statsArea');
  const statusBar = document.getElementById('statusBar');
  const messageBar = document.getElementById('messageBar');
  const messageContent = document.getElementById('messageContent');

  // 显示元素
  const coverImg = document.getElementById('coverImg');
  const videoTitle = document.getElementById('videoTitle');
  const videoAuthor = document.getElementById('videoAuthor');
  const videoDuration = document.getElementById('videoDuration');
  const videoPubdate = document.getElementById('videoPubdate');
  const videoDesc = document.getElementById('videoDesc');

  // 数字显示
  const numView = document.getElementById('num-view');
  const numLike = document.getElementById('num-like');
  const numDanmaku = document.getElementById('num-danmaku');
  const deltaView = document.getElementById('delta-view');
  const deltaLike = document.getElementById('delta-like');
  const deltaDanmaku = document.getElementById('delta-danmaku');

  // 卡片
  const cardView = document.getElementById('card-view');
  const cardLike = document.getElementById('card-like');
  const cardDanmaku = document.getElementById('card-danmaku');

  // 状态
  const refreshCountEl = document.getElementById('refreshCount');
  const lastUpdateEl = document.getElementById('lastUpdate');

  // ==================== 状态管理 ====================
  let isMonitoring = false;
  let currentBvid = '';
  let timerId = null;
  let refreshCount = 0;

  // 存储上次数据，用于计算增量
  let lastData = {
    view: 0,
    like: 0,
    danmaku: 0,
  };

  // ==================== 工具函数 ====================

  /** 格式化大数字（纯数字，千位逗号分隔） */
  function formatNumber(num) {
    if (num === null || num === undefined) return '--';
    const n = parseInt(num, 10);
    if (isNaN(n)) return '--';
    return n.toLocaleString('zh-CN');
  }

  /** 格式化时间 */
  function formatTime(seconds) {
    const h = Math.floor(seconds / 3600);
    const m = Math.floor((seconds % 3600) / 60);
    const s = seconds % 60;
    if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    return `${m}:${String(s).padStart(2,'0')}`;
  }

  /** 格式化日期 */
  function formatDate(timestamp) {
    const d = new Date(timestamp * 1000);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  /** 获取当前时间字符串 */
  function getNow() {
    const d = new Date();
    return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
  }

  // ==================== 数字滚动动画 ====================

  /**
   * 数字计数动画：从旧值平滑过渡到新值
   */
  function animateNumber(element, oldVal, newVal, cardElement) {
    if (oldVal === newVal) return;

    const duration = 600; // 动画时长ms
    const startTime = performance.now();
    const diff = newVal - oldVal;

    // 触发卡片闪烁
    if (cardElement && diff > 0) {
      cardElement.classList.add('updated');
      element.classList.add('counting');
      setTimeout(() => {
        cardElement.classList.remove('updated');
        element.classList.remove('counting');
      }, 700);
    }

    function step(currentTime) {
      const elapsed = currentTime - startTime;
      const progress = Math.min(elapsed / duration, 1);

      // easeOutCubic: 先快后慢
      const eased = 1 - Math.pow(1 - progress, 3);
      const current = Math.round(oldVal + diff * eased);

      element.textContent = formatNumber(current);

      if (progress < 1) {
        requestAnimationFrame(step);
      } else {
        element.textContent = formatNumber(newVal);
      }
    }

    requestAnimationFrame(step);
  }

  /**
   * 更新增量显示
   */
  function updateDelta(el, delta) {
    if (delta > 0) {
      el.innerHTML = `<span style="color: #00e676;">▲ +${formatNumber(delta)}</span>`;
      el.style.animation = 'none';
      el.offsetHeight; // 触发reflow
      el.style.animation = 'fadeInUp 0.5s ease-out';
    } else if (delta < 0) {
      el.innerHTML = `<span style="color: #ff5252;">▼ ${formatNumber(Math.abs(delta))}</span>`;
    } else {
      el.innerHTML = '<span style="color: rgba(255,255,255,0.2);">— 无变化</span>';
    }
  }

  // ==================== API调用 ====================

  async function fetchVideoData(bvid) {
    // 通过 allorigins.win 公网 CORS 代理调用 B站 API
    // 添加 _t 时间戳参数避免缓存
    const apiUrl = 'https://api.bilibili.com/x/web-interface/view?bvid=' + bvid + '&_t=' + Date.now();
    const url = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(apiUrl);
    console.log('[请求]', url);
    const response = await fetch(url);
    if (!response.ok) {
      throw new Error('HTTP ' + response.status + '：代理请求失败，请稍后重试');
    }
    const data = await response.json();
    console.log('[响应] code=' + data.code + ' msg=' + data.message);
    if (data.code !== 0) {
      if (data.code === -404) {
        throw new Error('BV号无效：该视频不存在或已删除（' + bvid + '）');
      }
      if (data.code === -400) {
        throw new Error('BV号格式错误：' + (data.message || '请检查是否包含非法字符'));
      }
      throw new Error('B站返回错误 [' + data.code + ']：' + (data.message || '未知'));
    }
    return data.data;
  }

  // ==================== 数据更新 ====================

  async function refreshData() {
    if (!currentBvid) return;

    try {
      const video = await fetchVideoData(currentBvid);
      const stat = video.stat || {};

      const newView = stat.view || 0;
      const newLike = stat.like || 0;
      const newDanmaku = stat.danmaku || 0;

      // 首次加载：直接显示，不播动画
      if (refreshCount === 0) {
        numView.textContent = formatNumber(newView);
        numLike.textContent = formatNumber(newLike);
        numDanmaku.textContent = formatNumber(newDanmaku);
        deltaView.innerHTML = '<span style="color: rgba(0,229,255,0.3);">初始数据</span>';
        deltaLike.innerHTML = '<span style="color: rgba(255,45,149,0.3);">初始数据</span>';
        deltaDanmaku.innerHTML = '<span style="color: rgba(255,215,64,0.3);">初始数据</span>';

        lastData.view = newView;
        lastData.like = newLike;
        lastData.danmaku = newDanmaku;

        // 显示视频信息
        updateVideoInfo(video);
      } else {
        // 播放量动画
        animateNumber(numView, lastData.view, newView, cardView);
        updateDelta(deltaView, newView - lastData.view);

        // 点赞数动画
        animateNumber(numLike, lastData.like, newLike, cardLike);
        updateDelta(deltaLike, newLike - lastData.like);

        // 弹幕数动画
        animateNumber(numDanmaku, lastData.danmaku, newDanmaku, cardDanmaku);
        updateDelta(deltaDanmaku, newDanmaku - lastData.danmaku);

        lastData.view = newView;
        lastData.like = newLike;
        lastData.danmaku = newDanmaku;
      }

      refreshCount++;
      refreshCountEl.textContent = refreshCount;
      lastUpdateEl.textContent = getNow();

      // 隐藏错误信息
      hideMessage();

    } catch (err) {
      console.error('刷新数据失败:', err);
      showMessage('⚠️ 刷新失败：' + err.message, 'warning');
    }
  }

  function updateVideoInfo(video) {
    videoInfo.classList.remove('hidden');

    // 封面：强制使用HTTPS，B站CDN支持
    if (video.pic) {
      const httpsPic = video.pic.replace(/^http:/, 'https:');
      coverImg.src = httpsPic;
    }

    // 标题
    videoTitle.textContent = video.title || '未知标题';

    // UP主
    videoAuthor.innerHTML = `👤 <span style="color: rgba(0,229,255,0.8);">${video.owner?.name || '未知UP主'}</span>`;

    // 时长
    videoDuration.innerHTML = `⏱ <span>${formatTime(video.duration || 0)}</span>`;

    // 发布日期
    videoPubdate.innerHTML = `📅 <span>${formatDate(video.pubdate || 0)}</span>`;

    // 简介
    if (videoDesc) {
      videoDesc.textContent = (video.desc || '暂无简介').replace(/\n/g, ' ');
    }
  }

  // ==================== 消息提示 ====================

  function showMessage(msg, type) {
    messageBar.classList.remove('hidden');
    messageContent.textContent = msg;
    if (type === 'error') {
      messageContent.style.color = '#ff5252';
    } else if (type === 'warning') {
      messageContent.style.color = '#ffd740';
    } else if (type === 'loading') {
      messageContent.style.color = '#00e5ff';
    } else {
      messageContent.style.color = '#00e676';
    }
  }

  function hideMessage() {
    messageBar.classList.add('hidden');
  }

  // ==================== 监控控制 ====================

  async function startMonitor() {
    const bvid = bvidInput.value.trim();
    if (!bvid) {
      showMessage('⚠️ 请先输入视频 BV 号', 'warning');
      return;
    }
    if (!/^BV[a-zA-Z0-9]+$/i.test(bvid)) {
      showMessage('⚠️ BV 号格式不正确（应以 BV 开头）', 'warning');
      return;
    }

    // B站BV号区分大小写，保留原始大小写
    currentBvid = bvid;
    isMonitoring = true;
    refreshCount = 0;

    // 重置数据
    lastData = { view: 0, like: 0, danmaku: 0 };
    deltaView.innerHTML = '';
    deltaLike.innerHTML = '';
    deltaDanmaku.innerHTML = '';

    // 更新按钮
    monitorBtn.textContent = '⏹ 停止监控';
    monitorBtn.classList.add('active');

    // 显示UI
    statsArea.classList.remove('hidden');
    statusBar.classList.remove('hidden');
    refreshCountEl.textContent = '0';
    lastUpdateEl.textContent = '--';

    // 立即获取一次
    showMessage('🔄 正在获取数据...', 'loading');
    try {
      await refreshData();
      hideMessage();
    } catch (err) {
      showMessage('❌ 获取数据失败：' + err.message, 'error');
    }

    // 启动定时刷新
    timerId = setInterval(refreshData, 30000);
  }

  function stopMonitor() {
    isMonitoring = false;
    if (timerId) {
      clearInterval(timerId);
      timerId = null;
    }

    monitorBtn.textContent = '▶ 开始监控';
    monitorBtn.classList.remove('active');

    showMessage('⏸ 监控已停止', 'info');
  }

  function toggleMonitor() {
    if (isMonitoring) {
      stopMonitor();
    } else {
      startMonitor();
    }
  }

  // ==================== 键盘事件 ====================

  bvidInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      toggleMonitor();
    }
  });

  // 自动转换小写bv为大写BV
  bvidInput.addEventListener('input', (e) => {
    const val = e.target.value;
    if (val.length >= 2 && val.slice(0, 2).toLowerCase() === 'bv' && val.slice(0, 2) !== 'BV') {
      e.target.value = 'BV' + val.slice(2);
    }
  });

  // ==================== 初始化粒子背景 ====================

  (function createParticles() {
    const container = document.getElementById('particles');
    const count = 30;
    for (let i = 0; i < count; i++) {
      const particle = document.createElement('div');
      particle.classList.add('particle');
      particle.style.left = Math.random() * 100 + '%';
      particle.style.animationDuration = (8 + Math.random() * 16) + 's';
      particle.style.animationDelay = Math.random() * 15 + 's';
      particle.style.width = (1.5 + Math.random() * 2.5) + 'px';
      particle.style.height = particle.style.width;
      particle.style.opacity = (0.1 + Math.random() * 0.4);
      container.appendChild(particle);
    }
  })();

  // ==================== 启动 ====================
  console.log('🚀 B站视频数据监控大屏已就绪（独立版）');
  console.log('💡 直接输入BV号即可使用，无需本地服务器');

  // 预填一个确认可用的BV号
  bvidInput.value = '';
  </script>

</body>
</html>
